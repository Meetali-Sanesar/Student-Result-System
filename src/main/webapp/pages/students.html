<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMS | Student Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo-icon">🎓</div><div class="logo-text">SRMS<span>Admin Panel</span></div></div>
        <div class="sidebar-nav">
            <div class="nav-section-title">Main</div>
            <a class="nav-item" href="admin-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
            <a class="nav-item active" href="students.html"><span class="nav-icon">👨‍🎓</span>Students</a>
            <a class="nav-item" href="subjects.html"><span class="nav-icon">📚</span>Subjects</a>
            <a class="nav-item" href="marks.html"><span class="nav-icon">✏️</span>Marks</a>
            <div class="nav-section-title">Results</div>
            <a class="nav-item" href="results.html"><span class="nav-icon">📋</span>Results</a>
            <a class="nav-item" href="rankings.html"><span class="nav-icon">🏆</span>Rankings</a>
            <div class="nav-section-title">System</div>
            <a class="nav-item" href="audit-logs.html"><span class="nav-icon">📝</span>Audit Logs</a>
        </div>
        <div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="user-avatar">A</div><div class="user-details"><div class="user-name" id="user-name">Admin</div><div class="user-role" id="user-role">Administrator</div></div></div></div>
    </nav>

    <main class="main-content">
        <header class="content-header">
            <div class="flex items-center gap-2"><button class="hamburger" id="hamburger">☰</button><h1>Student Management</h1></div>
            <div class="header-actions">
                <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Student</button>
                <button class="btn btn-secondary btn-sm" onclick="App.logout()">Logout</button>
            </div>
        </header>

        <div class="content-body">
            <div class="toolbar">
                <div class="search-box"><input type="text" id="search-input" placeholder="Search students by name or email..." oninput="searchStudents()"></div>
                <select class="form-control" id="dept-filter" onchange="filterByDept()" style="max-width:220px;"><option value="">All Departments</option></select>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Department</th><th>Actions</th></tr></thead>
                    <tbody id="students-table"><tr><td colspan="6" class="text-center" style="padding:2rem;color:var(--text-muted);">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="student-modal">
    <div class="modal">
        <div class="modal-header"><h2 id="modal-title">Add Student</h2><button class="modal-close" onclick="App.closeModal('student-modal')">✕</button></div>
        <div class="modal-body">
            <form id="student-form">
                <input type="hidden" id="edit-id">
                <div class="form-group"><label>Name</label><input type="text" id="f-name" class="form-control" placeholder="Full name" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="f-email" class="form-control" placeholder="email@university.edu" required></div>
                <div class="form-group"><label>Phone</label><input type="text" id="f-phone" class="form-control" placeholder="10-digit phone"></div>
                <div class="form-group"><label>Department</label>
                    <select id="f-dept" class="form-control" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Electrical Engineering">Electrical Engineering</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        <option value="Electronics">Electronics</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="App.closeModal('student-modal')">Cancel</button>
            <button class="btn btn-primary" id="save-btn" onclick="saveStudent()">Save</button>
        </div>
    </div>
</div>

<script src="../js/app.js"></script>
<script>
    let allStudents = [];

    (async () => {
        const user = await App.requireAuth('ADMIN');
        if (!user) return;
        App.initSidebar();
        App.setupUserInfo(user);
        await loadStudents();
        await loadDepartments();
    })();

    async function loadStudents() {
        const result = await App.apiCall('GET', '/students');
        if (result.success) { allStudents = result.data; renderStudents(allStudents); }
    }

    async function loadDepartments() {
        const result = await App.apiCall('GET', '/students/departments');
        if (result.success) {
            const select = document.getElementById('dept-filter');
            result.data.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; select.appendChild(o); });
        }
    }

    function renderStudents(students) {
        const tbody = document.getElementById('students-table');
        if (students.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="text-center" style="padding:2rem;"><div class="empty-state"><div class="empty-icon">👨‍🎓</div><h3>No students found</h3></div></td></tr>'; return; }
        let index = 1;
        tbody.innerHTML = students.map(s => `<tr>
            <td style="font-weight:600;">#${index++}</td>
            <td style="font-weight:500;">${App.escapeHtml(s.name)}</td>
            <td style="color:var(--text-secondary);">${App.escapeHtml(s.email)}</td>
            <td>${App.escapeHtml(s.phone || 'N/A')}</td>
            <td><span class="badge badge-blue">${App.escapeHtml(s.department)}</span></td>
            <td>
                <button class="btn btn-secondary btn-sm" onclick="openEditModal(${s.studentId})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.studentId}, '${App.escapeHtml(s.name)}')">Delete</button>
            </td>
        </tr>`).join('');
    }

    function searchStudents() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = allStudents.filter(s => s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q));
        renderStudents(filtered);
    }

    async function filterByDept() {
        const dept = document.getElementById('dept-filter').value;
        if (!dept) { renderStudents(allStudents); return; }
        const result = await App.apiCall('GET', '/students/filter?dept=' + encodeURIComponent(dept));
        if (result.success) renderStudents(result.data);
    }

    function openAddModal() {
        document.getElementById('modal-title').textContent = 'Add Student';
        document.getElementById('student-form').reset();
        document.getElementById('edit-id').value = '';
        App.openModal('student-modal');
    }

    function openEditModal(id) {
        const s = allStudents.find(x => x.studentId === id);
        if (!s) return;
        document.getElementById('modal-title').textContent = 'Edit Student';
        document.getElementById('edit-id').value = id;
        document.getElementById('f-name').value = s.name;
        document.getElementById('f-email').value = s.email;
        document.getElementById('f-phone').value = s.phone || '';
        document.getElementById('f-dept').value = s.department;
        App.openModal('student-modal');
    }

    async function saveStudent() {
        const id = document.getElementById('edit-id').value;
        const data = {
            name: document.getElementById('f-name').value,
            email: document.getElementById('f-email').value,
            phone: document.getElementById('f-phone').value,
            department: document.getElementById('f-dept').value
        };
        if (!data.name || !data.email || !data.department) { App.showToast('Please fill all required fields', 'error'); return; }

        let result;
        if (id) { result = await App.apiCall('PUT', '/students/' + id, data); }
        else { result = await App.apiCall('POST', '/students', data); }

        if (result.success) {
            App.showToast(result.message, 'success');
            App.closeModal('student-modal');
            await loadStudents();
        } else {
            App.showToast(result.message, 'error');
        }
    }

    async function deleteStudent(id, name) {
        const ok = await App.confirm('Delete Student', `Are you sure you want to delete "${name}"? This action cannot be undone.`);
        if (!ok) return;
        const result = await App.apiCall('DELETE', '/students/' + id);
        if (result.success) { App.showToast(result.message, 'success'); await loadStudents(); }
        else App.showToast(result.message, 'error');
    }
</script>
</body>
</html>
