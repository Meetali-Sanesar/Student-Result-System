<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SRMS | Subjects</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="app-layout">
    <nav class="sidebar" id="sidebar"><div class="sidebar-header"><div class="logo-icon">🎓</div><div class="logo-text">SRMS<span>Admin Panel</span></div></div><div class="sidebar-nav"><div class="nav-section-title">Main</div><a class="nav-item" href="admin-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a><a class="nav-item" href="students.html"><span class="nav-icon">👨‍🎓</span>Students</a><a class="nav-item active" href="subjects.html"><span class="nav-icon">📚</span>Subjects</a><a class="nav-item" href="marks.html"><span class="nav-icon">✏️</span>Marks</a><div class="nav-section-title">Results</div><a class="nav-item" href="results.html"><span class="nav-icon">📋</span>Results</a><a class="nav-item" href="rankings.html"><span class="nav-icon">🏆</span>Rankings</a><div class="nav-section-title">System</div><a class="nav-item" href="audit-logs.html"><span class="nav-icon">📝</span>Audit Logs</a></div><div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="user-avatar">A</div><div class="user-details"><div class="user-name" id="user-name">Admin</div><div class="user-role" id="user-role">Administrator</div></div></div></div></nav>

    <main class="main-content">
        <header class="content-header"><div class="flex items-center gap-2"><button class="hamburger" id="hamburger">☰</button><h1>Subject Management</h1></div><div class="header-actions"><button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add Subject</button><button class="btn btn-secondary btn-sm" onclick="App.logout()">Logout</button></div></header>
        <div class="content-body">
            <div class="table-container"><table class="data-table"><thead><tr><th>ID</th><th>Subject Name</th><th>Subject Code</th><th>Actions</th></tr></thead><tbody id="subject-table"><tr><td colspan="4" class="text-center" style="padding:2rem;color:var(--text-muted);">Loading...</td></tr></tbody></table></div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="subject-modal"><div class="modal"><div class="modal-header"><h2 id="modal-title">Add Subject</h2><button class="modal-close" onclick="App.closeModal('subject-modal')">✕</button></div><div class="modal-body"><form id="subject-form"><input type="hidden" id="edit-id"><div class="form-group"><label>Subject Name</label><input type="text" id="f-name" class="form-control" placeholder="e.g. Mathematics" required></div><div class="form-group"><label>Subject Code</label><input type="text" id="f-code" class="form-control" placeholder="e.g. MATH101" required style="text-transform:uppercase;"></div></form></div><div class="modal-footer"><button class="btn btn-secondary" onclick="App.closeModal('subject-modal')">Cancel</button><button class="btn btn-primary" onclick="save()">Save</button></div></div></div>

<script src="../js/app.js"></script>
<script>
    let subjects = [];
    (async () => {
        const user = await App.requireAuth('ADMIN'); if (!user) return; App.initSidebar(); App.setupUserInfo(user); await load();
    })();
    async function load() {
        const r = await App.apiCall('GET', '/subjects'); if (r.success) { subjects = r.data; render(); }
    }
    function render() {
        const tbody = document.getElementById('subject-table');
        if (subjects.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center" style="padding:2rem;"><div class="empty-state"><div class="empty-icon">📚</div><h3>No subjects found</h3></div></td></tr>'; return; }
        tbody.innerHTML = subjects.map((s, idx) => `<tr><td style="font-weight:600;">#${idx + 1}</td><td style="font-weight:500;">${App.escapeHtml(s.subjectName)}</td><td><span class="badge badge-blue">${App.escapeHtml(s.subjectCode)}</span></td><td><button class="btn btn-secondary btn-sm" onclick="openEdit(${s.subjectId})">Edit</button> <button class="btn btn-danger btn-sm" onclick="del(${s.subjectId},'${App.escapeHtml(s.subjectName)}')">Delete</button></td></tr>`).join('');
    }
    function openAdd() { document.getElementById('modal-title').textContent='Add Subject'; document.getElementById('subject-form').reset(); document.getElementById('edit-id').value=''; App.openModal('subject-modal'); }
    function openEdit(id) { const s=subjects.find(x=>x.subjectId===id); if(!s)return; document.getElementById('modal-title').textContent='Edit Subject'; document.getElementById('edit-id').value=id; document.getElementById('f-name').value=s.subjectName; document.getElementById('f-code').value=s.subjectCode; App.openModal('subject-modal'); }
    async function save() {
        const id=document.getElementById('edit-id').value; const data={subjectName:document.getElementById('f-name').value,subjectCode:document.getElementById('f-code').value.toUpperCase()};
        if(!data.subjectName||!data.subjectCode){App.showToast('Fill all fields','error');return;}
        const r=id?await App.apiCall('PUT','/subjects/'+id,data):await App.apiCall('POST','/subjects',data);
        if(r.success){App.showToast(r.message,'success');App.closeModal('subject-modal');await load();}else App.showToast(r.message,'error');
    }
    async function del(id,name) { if(!await App.confirm('Delete Subject','Delete "'+name+'"? This will remove all related marks.'))return; const r=await App.apiCall('DELETE','/subjects/'+id); if(r.success){App.showToast(r.message,'success');await load();}else App.showToast(r.message,'error'); }
</script>
</body>
</html>
