<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Result Management System - Register">
    <title>SRMS | Sign Up</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="max-width: 450px; margin: 2rem auto;">
            <div class="logo">
                <div class="icon">🎓</div>
                <h1>Create Account</h1>
                <p class="subtitle">Student Result Registration</p>
            </div>

            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Choose Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username (lowercase)" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Choose Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
                </div>
                <div id="error-message" class="hidden" style="color: var(--accent-rose); font-size: 0.8125rem; margin-bottom: 1rem; text-align: center;"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
                    Sign Up
                </button>
            </form>

            <div style="margin-top: 1.25rem; text-align: center;">
                <p style="font-size: 0.875rem; color: var(--text-secondary);">
                    Already have an account? <a href="login.html" style="color: var(--accent-blue); font-weight: 500; text-decoration: none;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorEl = document.getElementById('error-message');
            errorEl.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorEl.textContent = 'Please fill out all required fields';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Registering...';

            const result = await App.apiCall('POST', '/auth/register', { 
                username, password 
            });

            if (result.success) {
                App.showToast('Account created successfully! Please log in.', 'success');
                setTimeout(() => {
                    App.navigateTo('login');
                }, 1500);
            } else {
                errorEl.textContent = result.message || 'Registration failed';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
