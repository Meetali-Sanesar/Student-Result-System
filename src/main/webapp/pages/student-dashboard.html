<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMS | Student Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🎓</div>
                <div class="logo-text">SRMS<span>Student Portal</span></div>
            </div>
            <div class="sidebar-nav">
                <div class="nav-section-title">Menu</div>
                <a class="nav-item active" href="student-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
                <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span>Profile</a>
                <a class="nav-item" href="notifications.html"><span class="nav-icon">🔔</span>Notifications <span class="badge badge-rose" id="nav-notif-count" style="margin-left:auto;display:none;">0</span></a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">S</div>
                    <div class="user-details">
                        <div class="user-name" id="user-name">Student</div>
                        <div class="user-role" id="user-role">Student</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <div class="flex items-center gap-2">
                    <button class="hamburger" id="hamburger">☰</button>
                    <h1>My Dashboard</h1>
                </div>
                <div class="header-actions">
                    <div class="notification-bell" onclick="App.navigateTo('notifications')">
                        🔔<span class="count hidden" id="notif-count">0</span>
                    </div>
                    <button class="btn btn-secondary btn-sm" onclick="App.logout()">Logout</button>
                </div>
            </header>

            <div class="content-body">
                <!-- Profile Card -->
                <div class="profile-card" id="profile-card">
                    <div class="profile-avatar" id="profile-avatar">S</div>
                    <div class="profile-info">
                        <h2 id="student-name">Loading...</h2>
                        <div class="profile-dept" id="student-dept"></div>
                        <div class="profile-details">
                            <div class="profile-detail-item"><div class="detail-label">Email</div><div class="detail-value" id="student-email">-</div></div>
                            <div class="profile-detail-item"><div class="detail-label">Phone</div><div class="detail-value" id="student-phone">-</div></div>
                            <div class="profile-detail-item"><div class="detail-label">Student ID</div><div class="detail-value" id="student-id">-</div></div>
                            <div class="profile-detail-item"><div class="detail-label">Joined</div><div class="detail-value" id="student-joined">-</div></div>
                        </div>
                    </div>
                </div>

                <!-- Result Summary -->
                <div class="stats-grid" id="result-stats">
                    <div class="stat-card emerald"><div class="stat-icon">📊</div><div class="stat-value" id="my-percentage">-</div><div class="stat-label">Percentage</div></div>
                    <div class="stat-card blue"><div class="stat-icon">🏅</div><div class="stat-value" id="my-grade">-</div><div class="stat-label">Grade</div></div>
                    <div class="stat-card amber"><div class="stat-icon">🏆</div><div class="stat-value" id="my-rank">-</div><div class="stat-label">Class Rank</div></div>
                    <div class="stat-card purple"><div class="stat-icon">📝</div><div class="stat-value" id="my-total">-</div><div class="stat-label">Total Marks</div></div>
                </div>

                <!-- Marks Table -->
                <div class="card">
                    <div class="card-header">
                        <h2>📚 My Marks</h2>
                        <button class="btn btn-primary btn-sm" id="download-pdf-btn" onclick="downloadMyResult()">📄 Download PDF</button>
                    </div>
                    <div class="card-body" style="padding:0;">
                        <div class="table-container">
                            <table class="data-table">
                                <thead><tr><th>#</th><th>Subject</th><th>Code</th><th>Marks</th><th>Status</th></tr></thead>
                                <tbody id="marks-table"><tr><td colspan="5" class="text-center" style="padding:2rem;color:var(--text-muted);">Loading marks...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        let studentId = null;

        (async () => {
            const user = await App.requireAuth('STUDENT');
            if (!user) return;
            App.initSidebar();
            App.setupUserInfo(user);
            studentId = user.studentId;

            // Load student profile
            const profileResult = await App.apiCall('GET', '/students/' + studentId);
            if (profileResult.success) {
                const s = profileResult.data;
                document.getElementById('student-name').textContent = s.name;
                document.getElementById('student-dept').textContent = s.department;
                document.getElementById('student-email').textContent = s.email;
                document.getElementById('student-phone').textContent = s.phone || 'N/A';
                document.getElementById('student-id').textContent = '#' + s.studentId;
                document.getElementById('student-joined').textContent = App.formatDate(s.createdAt);
                document.getElementById('profile-avatar').textContent = s.name[0];
                if (s.profileImage) {
                    document.getElementById('profile-avatar').innerHTML = `<img src="../uploads/${s.profileImage}" alt="Profile">`;
                }
            }

            // Load marks
            const marksResult = await App.apiCall('GET', '/marks/student/' + studentId);
            if (marksResult.success) {
                const marks = marksResult.data;
                if (marks.length > 0) {
                    document.getElementById('marks-table').innerHTML = marks.map((m, i) => `
                        <tr>
                            <td>${i + 1}</td>
                            <td style="font-weight:500;">${App.escapeHtml(m.subjectName)}</td>
                            <td><span class="badge badge-blue">${App.escapeHtml(m.subjectCode)}</span></td>
                            <td style="font-weight:600;">${m.marks.toFixed(2)}</td>
                            <td><span class="badge ${m.marks >= 60 ? 'badge-emerald' : 'badge-rose'}">${m.marks >= 60 ? 'Pass' : 'Fail'}</span></td>
                        </tr>`).join('');
                } else {
                    document.getElementById('marks-table').innerHTML = '<tr><td colspan="5" class="text-center" style="padding:2rem;color:var(--text-muted);">No marks available yet</td></tr>';
                }
            }

            // Load result
            try {
                const resultData = await App.apiCall('GET', '/results/' + studentId);
                if (resultData.success) {
                    const r = resultData.data;
                    document.getElementById('my-percentage').textContent = r.percentage + '%';
                    document.getElementById('my-grade').textContent = r.grade;
                    document.getElementById('my-rank').textContent = '#' + r.rankPosition;
                    document.getElementById('my-total').textContent = r.totalMarks.toFixed(1);
                }
            } catch (e) { /* No result yet */ }

            // Load notifications count
            const notifResult = await App.apiCall('GET', '/notifications');
            if (notifResult.success) {
                const count = notifResult.data.unreadCount;
                if (count > 0) {
                    document.getElementById('notif-count').textContent = count;
                    document.getElementById('notif-count').classList.remove('hidden');
                    const navBadge = document.getElementById('nav-notif-count');
                    navBadge.textContent = count;
                    navBadge.style.display = 'inline-flex';
                }
            }
        })();

        function downloadMyResult() {
            if (studentId) {
                App.downloadFile('/files/result-pdf/' + studentId, 'my_result.pdf');
            }
        }
    </script>
</body>
</html>
