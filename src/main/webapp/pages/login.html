<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Result Management System - Login">
    <title>SRMS | Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="icon">🎓</div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Student Result Management System</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <input type="checkbox" id="rememberMe" style="width: auto; margin: 0; cursor: pointer;">
                    <label for="rememberMe" style="margin: 0; font-size: 0.875rem; cursor: pointer; user-select: none; color: var(--text-secondary);">Remember Me</label>
                </div>
                <div id="error-message" class="hidden" style="color: var(--accent-rose); font-size: 0.8125rem; margin-bottom: 1rem; text-align: center;"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div style="margin-top: 1.25rem; text-align: center;">
                <p style="font-size: 0.875rem; color: var(--text-secondary);">
                    Don't have an account? <a href="register.html" style="color: var(--accent-blue); font-weight: 500; text-decoration: none;">Sign Up</a>
                </p>
            </div>

            <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color); text-align: center;">
                <p style="font-size: 0.75rem; color: var(--text-muted);">
                    Demo Credentials<br>
                    Admin: <strong>admin</strong> / <strong>admin123</strong><br>
                    Student: <strong>aarav.sharma</strong> / <strong>student123</strong>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('error-message');
            errorEl.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                errorEl.textContent = 'Please enter both username and password';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const result = await App.apiCall('POST', '/auth/login', { username, password, rememberMe });

            if (result.success) {
                App.showToast('Login successful!', 'success');
                const role = result.data.role;
                setTimeout(() => {
                    if (role === 'ADMIN') {
                        App.navigateTo('admin-dashboard');
                    } else {
                        App.navigateTo('student-dashboard');
                    }
                }, 500);
            } else {
                errorEl.textContent = result.message || 'Login failed';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
