<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SRMS | Rankings</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="app-layout">
    <nav class="sidebar" id="sidebar"><div class="sidebar-header"><div class="logo-icon">🎓</div><div class="logo-text">SRMS<span>Admin Panel</span></div></div><div class="sidebar-nav"><div class="nav-section-title">Main</div><a class="nav-item" href="admin-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a><a class="nav-item" href="students.html"><span class="nav-icon">👨‍🎓</span>Students</a><a class="nav-item" href="subjects.html"><span class="nav-icon">📚</span>Subjects</a><a class="nav-item" href="marks.html"><span class="nav-icon">✏️</span>Marks</a><div class="nav-section-title">Results</div><a class="nav-item" href="results.html"><span class="nav-icon">📋</span>Results</a><a class="nav-item active" href="rankings.html"><span class="nav-icon">🏆</span>Rankings</a><div class="nav-section-title">System</div><a class="nav-item" href="audit-logs.html"><span class="nav-icon">📝</span>Audit Logs</a></div><div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="user-avatar">A</div><div class="user-details"><div class="user-name" id="user-name">Admin</div><div class="user-role" id="user-role">Administrator</div></div></div></div></nav>

    <main class="main-content">
        <header class="content-header"><div class="flex items-center gap-2"><button class="hamburger" id="hamburger">☰</button><h1>🏆 Student Rankings</h1></div><div class="header-actions"><button class="btn btn-secondary btn-sm" onclick="App.logout()">Logout</button></div></header>
        <div class="content-body">
            <!-- Top 3 Podium -->
            <div class="card" style="margin-bottom:2rem;">
                <div class="card-header"><h2>🥇 Top 3 Students</h2></div>
                <div class="card-body"><div class="ranking-podium" id="podium"></div></div>
            </div>
            <!-- Full Rankings -->
            <div class="card">
                <div class="card-header"><h2>Full Rankings</h2></div>
                <div class="card-body" style="padding:0;">
                    <div class="table-container"><table class="data-table"><thead><tr><th>Rank</th><th>Student</th><th>Department</th><th>Percentage</th><th>Grade</th></tr></thead><tbody id="rankings-table"><tr><td colspan="5" class="text-center" style="padding:2rem;color:var(--text-muted);">Loading...</td></tr></tbody></table></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/app.js"></script>
<script>
    (async()=>{
        const user=await App.requireAuth('ADMIN');if(!user)return;App.initSidebar();App.setupUserInfo(user);
        const r=await App.apiCall('GET','/results/top-students?limit=10');
        if(r.success && r.data.length>0){
            const top=r.data;
            // Podium (reorder: 2nd, 1st, 3rd)
            const podiumOrder=[top[1]||null, top[0], top[2]||null];
            let podiumHtml='';
            const medals=['🥈','🥇','🥉'];
            podiumOrder.forEach((s,i)=>{
                if(!s)return;
                podiumHtml+=`<div class="podium-item"><div class="podium-avatar">${s.studentName[0]}</div><div class="podium-name">${App.escapeHtml(s.studentName)}</div><div class="podium-score">${s.percentage}% | ${s.grade}</div><div class="podium-bar">${medals[i]}</div></div>`;
            });
            document.getElementById('podium').innerHTML=podiumHtml;

            // Rankings table
            document.getElementById('rankings-table').innerHTML=top.map((s,i)=>`<tr>
                <td style="font-weight:800;font-size:1.1rem;">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</td>
                <td style="font-weight:500;">${App.escapeHtml(s.studentName)}</td>
                <td><span class="badge badge-blue">${App.escapeHtml(s.department)}</span></td>
                <td style="font-weight:700;">${s.percentage.toFixed(2)}%</td>
                <td><span class="badge ${App.getGradeClass(s.grade)}">${s.grade}</span></td>
            </tr>`).join('');
        }
    })();
</script>
</body>
</html>
