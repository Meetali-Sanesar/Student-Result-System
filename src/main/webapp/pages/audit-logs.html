<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SRMS | Audit Logs</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div class="app-layout">
    <nav class="sidebar" id="sidebar"><div class="sidebar-header"><div class="logo-icon">🎓</div><div class="logo-text">SRMS<span>Admin Panel</span></div></div><div class="sidebar-nav"><div class="nav-section-title">Main</div><a class="nav-item" href="admin-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a><a class="nav-item" href="students.html"><span class="nav-icon">👨‍🎓</span>Students</a><a class="nav-item" href="subjects.html"><span class="nav-icon">📚</span>Subjects</a><a class="nav-item" href="marks.html"><span class="nav-icon">✏️</span>Marks</a><div class="nav-section-title">Results</div><a class="nav-item" href="results.html"><span class="nav-icon">📋</span>Results</a><a class="nav-item" href="rankings.html"><span class="nav-icon">🏆</span>Rankings</a><div class="nav-section-title">System</div><a class="nav-item active" href="audit-logs.html"><span class="nav-icon">📝</span>Audit Logs</a></div><div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="user-avatar">A</div><div class="user-details"><div class="user-name" id="user-name">Admin</div><div class="user-role" id="user-role">Administrator</div></div></div></div></nav>
    <main class="main-content">
        <header class="content-header"><div class="flex items-center gap-2"><button class="hamburger" id="hamburger">☰</button><h1>📝 Audit Logs</h1></div><div class="header-actions"><button class="btn btn-secondary btn-sm" onclick="App.logout()">Logout</button></div></header>
        <div class="content-body">
            <div class="table-container"><table class="data-table"><thead><tr><th>ID</th><th>Admin</th><th>Action</th><th>Details</th><th>Time</th></tr></thead><tbody id="logs-table"><tr><td colspan="5" class="text-center" style="padding:2rem;color:var(--text-muted);">Loading...</td></tr></tbody></table></div>
        </div>
    </main>
</div>
<script src="../js/app.js"></script>
<script>
    (async()=>{
        const user=await App.requireAuth('ADMIN');if(!user)return;App.initSidebar();App.setupUserInfo(user);
        const r=await App.apiCall('GET','/audit-logs');
        if(r.success){
            const tbody=document.getElementById('logs-table');
            if(r.data.length===0){tbody.innerHTML='<tr><td colspan="5" class="text-center" style="padding:2rem;"><div class="empty-state"><div class="empty-icon">📝</div><h3>No audit logs yet</h3></div></td></tr>';return;}
            tbody.innerHTML=r.data.map(l=>`<tr><td>#${l.logId}</td><td style="font-weight:500;">${App.escapeHtml(l.adminUsername||'Admin')}</td><td><span class="badge badge-blue">${App.escapeHtml(l.action)}</span></td><td style="color:var(--text-secondary);max-width:400px;">${App.escapeHtml(l.details||'')}</td><td style="white-space:nowrap;color:var(--text-muted);font-size:0.8125rem;">${App.formatDate(l.actionTime)}</td></tr>`).join('');
        }
    })();
</script>
</body>
</html>
